<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Мой первый сайт с мозгами</h1>
    <p>Сегодня научимся отправлять данные на сервер и получать ответ</p>
    <form method="post">
        <label for="message">Напиши, как ты себя чувствуешь</label><br>
        <textarea name="message" id="message" rows="4" cols="50" placeholder="Например: Всё отлично!"></textarea><br>
        <button type="submit">Отправить</button>
    </form>
    
    {% if recommendation %}

    <div class="result">
        <h3>Рекомендация:</h3>
        <p>{{ recommendation }}</p>
    </div>

    {% endif %}
    
</body>
</html>
