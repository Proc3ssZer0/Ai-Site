<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>My first AI site</h1>
    <form method="post">
        <label for="message">Write your feelings</label><br>
        <textarea name="message" id="message" rows="4" cols="50" placeholder="e.g: I'm fine!"></textarea><br>
        <button type="submit">Submit</button>
    </form>
    
    {% if recommendation %}

    <div class="result">
        <h3>Recommendation:</h3>
        <p>{{ recommendation }}</p>
    </div>

    {% endif %}
    
</body>
</html>
